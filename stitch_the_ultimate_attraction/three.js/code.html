<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_10 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_10" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_10');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0x8b4aff, 2, 100);
pointLight.position.set(10, 10, 10);
scene.add(pointLight);

// Cryptographic Triangles (Tetrahedrons)
const triangles = [];
const triangleCount = 15;
const colors = [0x8b4aff, 0x0ba3e6, 0x3c3743];

for (let i = 0; i < triangleCount; i++) {
  const geometry = new THREE.TetrahedronGeometry(Math.random() * 2 + 0.5);
  const material = new THREE.MeshPhongMaterial({
    color: colors[Math.floor(Math.random() * colors.length)],
    transparent: true,
    opacity: 0.6,
    shininess: 100,
    wireframe: Math.random() > 0.5
  });
  
  const mesh = new THREE.Mesh(geometry, material);
  
  mesh.position.set(
    (Math.random() - 0.5) * 40,
    (Math.random() - 0.5) * 40,
    (Math.random() - 0.5) * 20 - 10
  );
  
  mesh.rotation.set(
    Math.random() * Math.PI,
    Math.random() * Math.PI,
    Math.random() * Math.PI
  );
  
  // Custom properties for motion
  mesh.userData = {
    rotationSpeed: (Math.random() - 0.5) * 0.01,
    floatSpeed: (Math.random() - 0.5) * 0.005,
    floatOffset: Math.random() * Math.PI * 2
  };
  
  scene.add(mesh);
  triangles.push(mesh);
}

camera.position.z = 15;

function animate() {
  requestAnimationFrame(animate);
  
  const time = Date.now() * 0.001;
  
  triangles.forEach((mesh) => {
    mesh.rotation.x += mesh.userData.rotationSpeed;
    mesh.rotation.y += mesh.userData.rotationSpeed;
    
    // Floating motion
    mesh.position.y += Math.sin(time + mesh.userData.floatOffset) * 0.01;
    mesh.position.x += Math.cos(time + mesh.userData.floatOffset) * 0.005;
  });
  
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  const w = container.clientWidth || window.innerWidth;
  const h = container.clientHeight || window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

animate();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_10 -->
</body>
</html>
