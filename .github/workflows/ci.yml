name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Typecheck Web
        run: pnpm --filter @anonymous-chat/web typecheck
      - name: Typecheck API
        run: pnpm --filter @anonymous-chat/api typecheck
      - name: Lint
        run: pnpm lint
