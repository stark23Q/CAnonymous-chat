<style>
        body {

        .glass-panel {

<body class="text-on-surface">
<!-- Background Elements -->

<div class="fixed inset-0 z-0 opacity-20 pointer-events-none">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/20 rounded-full blur-[120px] pulse-element"></div>
<div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-secondary/10 rounded-full blur-[120px] pulse-element" style="animation-delay: 2s;"></div>
</div>
<!-- Main Container -->
<main class="relative z-10 min-h-screen flex items-center justify-center p-gutter">
<!-- Join Card -->
<div class="glass-panel w-full max-w-[440px] rounded-3xl p-10 flex flex-col items-center transition-all duration-500 hover:border-primary/20">
<!-- Brand Identity -->
<div class="mb-10 flex flex-col items-center">
<div class="w-16 h-16 bg-primary-container rounded-2xl flex items-center justify-center mb-6 shadow-2xl shadow-primary/20">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="security">security</span>
</div>
<h1 class="font-headline-xl text-headline-xl text-primary tracking-tighter mb-2">NoTrace</h1>
<p class="font-body-md text-body-md text-outline text-center px-4">
                    The sovereign communication layer for the modern age. Secure. Invisible. Immutable.
                </p>
</div>
<!-- Login Actions -->
<div class="w-full space-y-4">
<!-- Primary Action -->
<button class="w-full py-4 px-6 bg-primary text-on-primary font-label-md text-label-md rounded-xl flex items-center justify-center gap-3 glow-on-hover transition-all duration-300">
<span class="material-symbols-outlined" data-icon="bolt">bolt</span>
                    Join the Void
                </button>
<!-- Divider -->
<div class="flex items-center gap-4 py-4">
<div class="h-px flex-grow bg-white/5"></div>
<span class="font-label-sm text-label-sm text-outline uppercase tracking-widest">or</span>
<div class="h-px flex-grow bg-white/5"></div>
</div>
<!-- Secondary Action -->
<button class="w-full py-4 px-6 bg-white/5 hover:bg-white/10 text-on-surface font-label-md text-label-md rounded-xl flex items-center justify-center gap-3 transition-all duration-300 border border-white/5">
<span class="material-symbols-outlined" data-icon="fingerprint">fingerprint</span>

                    Enter Access Key

</div>

<span class="w-2 h-2 rounded-full bg-secondary pulse-element"></span>

</div>

                </p>

<div class="w-2 h-2 bg-secondary rounded-full"></div>
<span class="font-label-sm text-label-sm text-on-surface/60">ENCRYPTED_SIGNAL_STABLE</span>
</div>
</div>
<div class="fixed bottom-12 right-12 z-20 hidden lg:block">
<div class="glass-panel px-4 py-2 rounded-full flex items-center gap-3">
<span class="font-label-sm text-label-sm text-on-surface/60">V.0.9.42_STAGING</span>
<span class="material-symbols-outlined text-primary text-sm" data-icon="terminal">terminal</span>
</div>
</div>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('mousemove', (e) => {
            const card = document.querySelector('.glass-panel');
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // Subtle parallax tilt effect
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateX = (y - centerY) / 30;
            const rotateY = (centerX - x) / 30;

            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        document.querySelector('.glass-panel').addEventListener('mouseleave', () => {
            const card = document.querySelector('.glass-panel');
            card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg)`;
        });

        // Initialize Material Symbols Weights
        window.addEventListener('DOMContentLoaded', () => {
            const symbols = document.querySelectorAll('.material-symbols-outlined');
            symbols.forEach(symbol => {
                if(symbol.getAttribute('data-weight') === 'fill') {
                    symbol.style.fontVariationSettings = "'FILL' 1";
                }
            });
        });
    </script>
